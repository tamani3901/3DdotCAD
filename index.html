<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>Voxelエディタ ガイド機能付き</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #222;
            color: #fff;
            overscroll-behavior: none;
        }
        #controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            background: #333;
        }
        #top-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        #tab-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .tab-content {
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            padding: 5px 0;
            align-items: center;
        }
        .tab-content.active {
            display: flex;
        }
        #controls button,
        #controls input[type="color"],
        #controls input[type="number"],
        #controls input[type="range"],
        #controls input[type="file"] {
            padding: 5px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            background-color: #444;
            color: #fff;
            cursor: pointer;
        }
        #controls button:hover,
        .custom-file-label:hover {
            background-color: #666;
        }
        .tab-button.active {
            background-color: #007bff;
        }
        #grid-container {
            width: 80vw;
            height: 70vh;
            overflow: auto;
            border: 2px solid #444;
            margin: 10px;
            position: relative;
        }
        #grid-wrapper {
            position: relative;
        }
        #grid {
            position: relative;
            z-index: 20;
            display: grid;
            touch-action: none;
        }
        .cell {
            width: 20px;
            height: 20px;
            border: 1px solid #555;
            box-sizing: border-box;
            position: relative;
            /* 描画セル本体をガイドより上に */
            z-index: 10;
        }
        /* 下のレイヤーを表示するための半透明用要素 */
        .cell-under {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .cell-highlight {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }
        #selection-box {
            position: absolute;
            background-color: rgba(0, 100, 255, 0.4);
            border: 1px dashed rgba(255, 255, 255, 0.8);
            pointer-events: none;
            z-index: 50;
        }
        .selecting-cell, .selected-cell, .moving-box {
            opacity: 0.8;
            border: 1px solid rgba(255, 255, 255, 0.8) !important;
        }
        .moving-box {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border: 2px dashed rgba(255, 255, 255, 0.8) !important;
        }
        #renderer-container {
            display: none;
            width: 80vw;
            height: 70vh;
            margin: 10px;
            border: 2px solid #444;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #scrollButtons {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1000;
        }
        #scrollButtons button {
            background-color: #555;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        #scrollButtons button:hover {
            background-color: #888;
        }
        .overlay-image {
            position: absolute;
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
            user-select: none;
        }
        .overlay-image.moving {
            opacity: 0.5;
            pointer-events: none;
            z-index: 10;
            cursor: move;
        }
        .custom-file-label {
            padding: 6px 12px;
            background-color: #444;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            display: inline-block;
            font-size: 14px;
            border: none;
            transition: background-color 0.3s ease;
        }
        .custom-file-label:hover {
            background-color: #666;
        }
        #sideSelection {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            background: #444;
            border: 1px solid #666;
            z-index: 1001;
            border-radius: 8px;
            text-align: center;
        }
        #sideSelection p {
            margin-top: 0;
        }
        #sideSelection button {
            margin: 5px;
            padding: 8px 15px;
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="controls">
        <div id="top-controls">
            <div id="tab-buttons">
                <button class="tab-button active" data-tab="drawTab">描画</button>
                <button class="tab-button" data-tab="selectMoveTab">選択移動</button>
                <button class="tab-button" data-tab="insertTab">挿入</button>
                <button class="tab-button" data-tab="convertTab">変換</button>
                <button class="tab-button" data-tab="exportTab">エクスポート</button>
            </div>
            <button id="show2dBtn">2D表示</button>
            <button id="show3dBtn">3D表示</button>
            <input type="number" id="inputWidth" value="16" min="1" max="64" />×
            <input type="number" id="inputHeight" value="16" min="1" max="64" />×
            <input type="number" id="inputDepth" value="16" min="1" max="64" />
            <button id="resizeBtn">サイズ変更</button>
            <button id="layerPrevBtn">↑</button>
            <button id="layerNextBtn">↓</button>
            <span id="layerLabel"></span>
        </div>

        <div id="drawTab" class="tab-content active">
            <input type="color" id="colorPicker" value="#ff0000" />
            <button id="drawBtn">描画</button>
            <button id="eraseBtn">消去</button>
            <button id="toggleGuideBtn">ガイド表示: ON</button>
            <input type="range" id="brushSize" min="1" max="5" value="1" />
            <span id="brushSizeValue">1</span>
        </div>

        <div id="selectMoveTab" class="tab-content">
            <button id="selectBtn">選択</button>
            <button id="completeSelectionBtn" style="display:none;">選択完了</button>
            <button id="cancelSelectionBtn" style="display:none;">キャンセル</button>
            <button id="copyLayerAddBtn">レイヤーコピーして追加</button>
        </div>

        <div id="insertTab" class="tab-content">
            <input type="file" id="importJsonInput" accept=".json" style="display:none;" />
            <label for="importJsonInput" class="custom-file-label">JSONインポート</label>
            <input type="file" id="imageInput" accept="image/*" style="display:none;" />
            <label for="imageInput" class="custom-file-label">画像インポート</label>
        </div>

        <div id="convertTab" class="tab-content">
            <button id="convertImageTo3dBtn">画像3D変換</button>
            <input type="number" id="imgWidth" value="100" style="width: 60px;" />×
            <input type="number" id="imgHeight" value="100" style="width: 60px;" />
            <button id="applyImageSize">画像サイズ変更</button>
            <button id="toggleMoveImage">画像移動モード: OFF</button>
            <button id="deleteImageBtn">画像削除</button>
        </div>

        <div id="exportTab" class="tab-content">
            <button id="saveObjBtn">OBJエクスポート</button>
            <button id="saveJsonBtn">JSONエクスポート</button>
            <button id="save3dImageBtn">スクショ</button>
        </div>
    </div>

    <div id="grid-container">
        <div id="grid-wrapper">
            <div id="grid"></div>
            <div id="selection-box" style="display:none;"></div>
        </div>
    </div>

    <div id="renderer-container">
        <canvas id="threejs-canvas"></canvas>
    </div>

    <div id="sideSelection">
        <p>どの面に画像を配置しますか？</p>
        <button data-side="front">前面</button>
        <button data-side="back">背面</button>
        <button data-side="left">左面</button>
        <button data-side="right">右面</button>
        <button data-side="top">上面</button>
        <button data-side="bottom">下面</button>
        <button id="cancelBtn">キャンセル</button>
    </div>

    <div id="scrollButtons">
        <button id="scrollUp">↑</button>
        <button id="scrollDown">↓</button>
        <button id="scrollLeft">←</button>
        <button id="scrollRight">→</button>
        <button id="undoBtn">元に戻す</button>
        <button id="resetBtn">リセット</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <script type="module">
        
import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 全変数の宣言 ---
        let width = 16, height = 16, depth = 16;
        let currentLayer = 0;
        let drawColor = "#ff0000";
        let isErasing = false;
        let brushSize = 1;
        let voxelData = [];
        let scene, camera, renderer, controls;
        let is3DInitialized = false;
        let voxelMeshes = [];
        let undoStack = [];
        let cells = [];
        let overlayImage = null;
        let isImageMoveMode = false;
        let dragging = false;
        let dragStartX = 0, dragStartY = 0;
        let imgStartLeft = 0, imgStartTop = 0;
        let currentMode = 'draw'; 
        let showGuide = true; 
        let selectedCells = []; 
        let isSelecting = false;
        let selectStart = null;

        const grid = document.getElementById("grid");
        const layerLabel = document.getElementById("layerLabel");
        const toggleGuideBtn = document.getElementById('toggleGuideBtn');
        const gridContainer = document.getElementById('grid-container');
        const rendererContainer = document.getElementById('renderer-container');
        const imageInput = document.getElementById('imageInput');
        const sideSelection = document.getElementById('sideSelection');
        const selectionBox = document.getElementById('selection-box');
        const gridWrapper = document.getElementById('grid-wrapper');

        // --- データ初期化 ---
        function initData() {
            voxelData = Array.from({ length: height }, () =>
                Array.from({ length: depth }, () =>
                    Array.from({ length: width }, () => null)
                )
            );
        }

        function initGrid() {
            grid.innerHTML = "";
            cells = [];
            grid.style.gridTemplateColumns = `repeat(${width}, 20px)`;
            grid.style.gridTemplateRows = `repeat(${depth}, 20px)`;
            for (let z = 0; z < depth; z++) {
                const row = [];
                for (let x = 0; x < width; x++) {
                    const cell = document.createElement("div");
                    cell.className = "cell";
                    cell.dataset.x = x;
                    cell.dataset.z = z;
                    const under = document.createElement("div");
                    under.className = "cell-under";
                    cell.appendChild(under);
                    const h = document.createElement("div");
                    h.className = "cell-highlight";
                    h.style.display = "none";
                    cell.appendChild(h);
                    cell.addEventListener("mouseenter", () => h.style.display = "block");
                    cell.addEventListener("mouseleave", () => h.style.display = "none");
                    grid.appendChild(cell);
                    row.push(cell);
                }
                cells.push(row);
            }
        }

        function updateGridColors() {
            if (cells.length === 0) return;
            for (let z = 0; z < depth; z++) {
                for (let x = 0; x < width; x++) {
                    const cell = cells[z][x];
                    const under = cell.querySelector('.cell-under');
                    const color = voxelData[currentLayer][z][x];
                    cell.style.backgroundColor = color ?? "transparent";
                    if (showGuide && currentLayer > 0) {
                        const uc = voxelData[currentLayer - 1][z][x];
                        under.style.backgroundColor = uc ?? "transparent";
                        under.style.opacity = uc ? "0.3" : "0";
                    } else {
                        under.style.backgroundColor = "transparent";
                    }
                    const isSelected = selectedCells.some(c => c.x === x && c.z === z);
                    cell.classList.toggle('selected-cell', isSelected);
                }
            }
        }

        // --- 画像インポートの修正（自動リサイズ） ---
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                if (overlayImage) overlayImage.remove();
                overlayImage = document.createElement('img');
                overlayImage.src = ev.target.result;
                overlayImage.className = 'overlay-image';
                
                // 画像が読み込まれたらサイズを今のグリッドに合わせる
                overlayImage.onload = () => {
                    const gridW = width * 20;
                    const gridH = depth * 20;
                    const ratio = Math.min(gridW / overlayImage.naturalWidth, gridH / overlayImage.naturalHeight);
                    overlayImage.style.width = (overlayImage.naturalWidth * ratio) + "px";
                    overlayImage.style.top = "0px";
                    overlayImage.style.left = "0px";
                    // 数値を変換用の入力欄にもセットしておく
                    document.getElementById('imgWidth').value = width;
                    document.getElementById('imgHeight').value = depth;
                };
                gridWrapper.appendChild(overlayImage);
                // 面選択画面は「変換」タブを開いているときだけ出るように制御が必要ならここで判断
                sideSelection.style.display = 'block'; 
            };
            reader.readAsDataURL(file);
        });

        // 変換ロジック
        document.getElementById('convertImageTo3dBtn').addEventListener('click', () => {
            if (!overlayImage) return alert("画像を選択してください");
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 入力されたドット数に合わせて解析
            const targetW = parseInt(document.getElementById('imgWidth').value);
            const targetH = parseInt(document.getElementById('imgHeight').value);
            canvas.width = targetW;
            canvas.height = targetH;
            ctx.drawImage(overlayImage, 0, 0, targetW, targetH);
            
            const imgData = ctx.getImageData(0, 0, targetW, targetH).data;
            const side = overlayImage.dataset.side || 'front';
            
            saveStateForUndo();
            for (let y = 0; y < targetH; y++) {
                for (let x = 0; x < targetW; x++) {
                    const i = (y * targetW + x) * 4;
                    if (imgData[i+3] < 128) continue;
                    const hex = "#" + ((1 << 24) + (imgData[i] << 16) + (imgData[i+1] << 8) + imgData[i+2]).toString(16).slice(1);
                    
                    let vx, vy, vz;
                    if (side === 'front') { vx = x; vy = height - 1 - y; vz = 0; }
                    else if (side === 'back') { vx = x; vy = height - 1 - y; vz = depth - 1; }
                    else if (side === 'top') { vx = x; vy = height - 1; vz = y; }
                    else if (side === 'bottom') { vx = x; vy = 0; vz = y; }
                    else if (side === 'left') { vx = 0; vy = height - 1 - y; vz = x; }
                    else if (side === 'right') { vx = width - 1; vy = height - 1 - y; vz = x; }

                    if (vx>=0 && vx<width && vy>=0 && vy<height && vz>=0 && vz<depth) {
                        voxelData[vy][vz][vx] = hex;
                    }
                }
            }
            updateGridColors();
            alert("変換しました。3D表示で確認してください！");
        });

        // --- その他の基本機能（ボタン制御など） ---
        function setMode(m) {
            currentMode = m;
            isErasing = (m === 'erase');
            updateGridColors();
        }

        document.getElementById('drawBtn').addEventListener('click', () => setMode('draw'));
        document.getElementById('eraseBtn').addEventListener('click', () => setMode('erase'));
        toggleGuideBtn.addEventListener('click', () => {
            showGuide = !showGuide;
            toggleGuideBtn.textContent = `ガイド表示: ${showGuide ? 'ON' : 'OFF'}`;
            updateGridColors();
        });

        // レイヤー移動
        document.getElementById('layerPrevBtn').addEventListener('click', () => { if(currentLayer < height-1) { currentLayer++; updateUI(); } });
        document.getElementById('layerNextBtn').addEventListener('click', () => { if(currentLayer > 0) { currentLayer--; updateUI(); } });
        
        function updateUI() {
            layerLabel.textContent = `レイヤー: ${currentLayer + 1} / ${height}`;
            updateGridColors();
        }

        // 3D/2D切り替え
        document.getElementById('show2dBtn').addEventListener('click', () => { gridContainer.style.display='block'; rendererContainer.style.display='none'; });
        document.getElementById('show3dBtn').addEventListener('click', () => { 
            gridContainer.style.display='none'; rendererContainer.style.display='block'; 
            if(!is3DInitialized) init3D();
            update3DView();
        });

        // 初期実行
        initData();
        initGrid();
        updateUI();

        // --- (ここに前の第6弾の init3D, update3DView, saveObjBtn などの書き出し系を続けてください) ---
        setMode('draw');

        // モード切替（描画、消しゴム、選択など）
        function setMode(mode) {
            currentMode = mode;
            isErasing = (mode === 'erase');
            document.querySelectorAll('#drawTab button, #selectMoveTab button').forEach(btn => {
                btn.classList.remove('active');
            });
            if (mode === 'draw') document.getElementById('drawBtn').classList.add('active');
            if (mode === 'erase') document.getElementById('eraseBtn').classList.add('active');
            if (mode === 'select') document.getElementById('selectBtn').classList.add('active');
        }

        document.getElementById('drawBtn').addEventListener('click', () => setMode('draw'));
        document.getElementById('eraseBtn').addEventListener('click', () => setMode('erase'));
        document.getElementById('selectBtn').addEventListener('click', () => {
            setMode('select');
            selectedCells = [];
            updateGridColors();
        });

        // ブラシサイズ
        const brushSizeInput = document.getElementById('brushSize');
        const brushSizeValue = document.getElementById('brushSizeValue');
        brushSizeInput.addEventListener('input', () => {
            brushSize = parseInt(brushSizeInput.value);
            brushSizeValue.textContent = brushSize;
        });

        // 色選択
        document.getElementById('colorPicker').addEventListener('input', (e) => {
            drawColor = e.target.value;
            setMode('draw');
        });

        // --- 描画イベント ---
        let isMouseDown = false;
        grid.addEventListener('pointerdown', (e) => {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            isMouseDown = true;
            const x = parseInt(cell.dataset.x);
            const z = parseInt(cell.dataset.z);

            if (currentMode === 'draw' || currentMode === 'erase') {
                paintCells(x, z);
            } else if (currentMode === 'select') {
                isSelecting = true;
                selectStart = { x, z };
                updateSelectionBox(x, z, x, z);
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isMouseDown) return;
            const cell = document.elementFromPoint(e.clientX, e.clientY)?.closest('.cell');
            if (!cell) return;
            const x = parseInt(cell.dataset.x);
            const z = parseInt(cell.dataset.z);

            if (currentMode === 'draw' || currentMode === 'erase') {
                paintCells(x, z);
            } else if (isSelecting) {
                updateSelectionBox(selectStart.x, selectStart.z, x, z);
            }
        });

        window.addEventListener('pointerup', () => {
            if (isSelecting) {
                finalizeSelection();
            }
            isMouseDown = false;
            isSelecting = false;
        });

        // 選択範囲の枠を表示
        function updateSelectionBox(x1, z1, x2, z2) {
            const minX = Math.min(x1, x2);
            const maxX = Math.max(x1, x2);
            const minZ = Math.min(z1, z2);
            const maxZ = Math.max(z1, z2);
            
            selectionBox.style.display = 'block';
            selectionBox.style.left = (minX * 20) + 'px';
            selectionBox.style.top = (minZ * 20) + 'px';
            selectionBox.style.width = ((maxX - minX + 1) * 20) + 'px';
            selectionBox.style.height = ((maxZ - minZ + 1) * 20) + 'px';
        }

        function finalizeSelection() {
            const rect = selectionBox.getBoundingClientRect();
            const gridRect = grid.getBoundingClientRect();
            const minX = Math.floor((rect.left - gridRect.left) / 20);
            const minZ = Math.floor((rect.top - gridRect.top) / 20);
            const maxX = Math.floor((rect.right - gridRect.left) / 20) - 1;
            const maxZ = Math.floor((rect.bottom - gridRect.top) / 20) - 1;

            selectedCells = [];
            for (let z = minZ; z <= maxZ; z++) {
                for (let x = minX; x <= maxX; x++) {
                    if (x >= 0 && x < width && z >= 0 && z < depth) {
                        selectedCells.push({ x, z });
                    }
                }
            }
            updateGridColors();
        }

        // 元に戻す（Undo）
        function saveStateForUndo() {
            undoStack.push(JSON.stringify(voxelData));
            if (undoStack.length > 30) undoStack.shift();
        }

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (undoStack.length > 0) {
                voxelData = JSON.parse(undoStack.pop());
                updateGridColors();
                if (is3DInitialized) update3DView();
            }
        });

        // レイヤーコピーして追加
        document.getElementById('copyLayerAddBtn').addEventListener('click', () => {
            if (height >= 64) return;
            saveStateForUndo();
            const newLayer = JSON.parse(JSON.stringify(voxelData[currentLayer]));
            voxelData.splice(currentLayer + 1, 0, newLayer);
            height++;
            currentLayer++;
            updateLayerLabel();
            updateGridColors();
        });

        // タブ切り替え
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // レイヤー移動
        document.getElementById('layerPrevBtn').addEventListener('click', () => {
            if (currentLayer < height - 1) {
                currentLayer++;
                updateLayerLabel();
                updateGridColors();
            }
        });
        document.getElementById('layerNextBtn').addEventListener('click', () => {
            if (currentLayer > 0) {
                currentLayer--;
                updateLayerLabel();
                updateGridColors();
            }
        });

        // --- 画面切り替え ---
        document.getElementById('show2dBtn').addEventListener('click', () => {
            gridContainer.style.display = 'block';
            rendererContainer.style.display = 'none';
        });

        document.getElementById('show3dBtn').addEventListener('click', () => {
            gridContainer.style.display = 'none';
            rendererContainer.style.display = 'block';
            if (!is3DInitialized) {
                init3D();
            }
            update3DView();
        });

        // --- 画像読み込み ---
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                if (overlayImage) overlayImage.remove();
                overlayImage = document.createElement('img');
                overlayImage.src = event.target.result;
                overlayImage.className = 'overlay-image';
                overlayImage.id = 'targetImage';
                gridWrapper.appendChild(overlayImage);
                sideSelection.style.display = 'block'; // どの面に貼るか選択
            };
            reader.readAsDataURL(file);
        });

        // 画像の配置面を選択
        sideSelection.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                if (e.target.id !== 'cancelBtn') {
                    overlayImage.dataset.side = e.target.dataset.side;
                }
                sideSelection.style.display = 'none';
            }
        });

        // 画像移動モードの切り替え
        document.getElementById('toggleMoveImage').addEventListener('click', (e) => {
            isImageMoveMode = !isImageMoveMode;
            e.target.textContent = `画像移動モード: ${isImageMoveMode ? 'ON' : 'OFF'}`;
            if (overlayImage) {
                overlayImage.classList.toggle('moving', isImageMoveMode);
                overlayImage.style.pointerEvents = isImageMoveMode ? 'auto' : 'none';
            }
        });

        // 画像のドラッグ移動
        window.addEventListener('mousedown', (e) => {
            if (!isImageMoveMode || e.target !== overlayImage) return;
            dragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            imgStartLeft = overlayImage.offsetLeft;
            imgStartTop = overlayImage.offsetTop;
        });

        window.addEventListener('mousemove', (e) => {
            if (!dragging || !overlayImage) return;
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            overlayImage.style.left = (imgStartLeft + dx) + 'px';
            overlayImage.style.top = (imgStartTop + dy) + 'px';
        });

        window.addEventListener('mouseup', () => { dragging = false; });

        // 画像削除
        document.getElementById('deleteImageBtn').addEventListener('click', () => {
            if (overlayImage) {
                overlayImage.remove();
                overlayImage = null;
            }
        });

        // 画像をボクセルデータに変換
        document.getElementById('convertImageTo3dBtn').addEventListener('click', () => {
            if (!overlayImage) return;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = overlayImage;
            const side = img.dataset.side || 'front';
            
            // 指定されたサイズ（imgWidth/Height）でリサイズして解析
            const targetW = parseInt(document.getElementById('imgWidth').value);
            const targetH = parseInt(document.getElementById('imgHeight').value);
            canvas.width = targetW;
            canvas.height = targetH;
            ctx.drawImage(img, 0, 0, targetW, targetH);
            
            const imgData = ctx.getImageData(0, 0, targetW, targetH).data;
            saveStateForUndo();

            for (let y = 0; y < targetH; y++) {
                for (let x = 0; x < targetW; x++) {
                    const idx = (y * targetW + x) * 4;
                    const r = imgData[idx];
                    const g = imgData[idx + 1];
                    const b = imgData[idx + 2];
                    const a = imgData[idx + 3];
                    if (a < 128) continue; // 透明なら飛ばす

                    const hexColor = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                    
                    let vX, vY, vZ;
                    // 配置面に応じて座標を計算
                    if (side === 'front') { vX = x; vY = height - 1 - y; vZ = 0; }
                    else if (side === 'back') { vX = x; vY = height - 1 - y; vZ = depth - 1; }
                    else if (side === 'left') { vX = 0; vY = height - 1 - y; vZ = x; }
                    else if (side === 'right') { vX = width - 1; vY = height - 1 - y; vZ = x; }
                    else if (side === 'top') { vX = x; vY = height - 1; vZ = y; }
                    else if (side === 'bottom') { vX = x; vY = 0; vZ = y; }

                    if (vX >= 0 && vX < width && vY >= 0 && vY < height && vZ >= 0 && vZ < depth) {
                        voxelData[vY][vZ][vX] = hexColor;
                    }
                }
            }
            updateGridColors();
            alert("変換が完了しました");
        });
        // --- 3Dレンダリングの初期化 ---
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);
            camera = new THREE.PerspectiveCamera(75, rendererContainer.clientWidth / rendererContainer.clientHeight, 0.1, 1000);
            camera.position.set(width, height, depth);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('threejs-canvas'), antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(rendererContainer.clientWidth, rendererContainer.clientHeight);

            controls = new OrbitControls(camera, renderer.domElement);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            is3DInitialized = true;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function update3DView() {
            if (!is3DInitialized) return;
            voxelMeshes.forEach(m => scene.remove(m));
            voxelMeshes = [];

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            for (let y = 0; y < height; y++) {
                for (let z = 0; z < depth; z++) {
                    for (let x = 0; x < width; x++) {
                        const color = voxelData[y][z][x];
                        if (color) {
                            const material = new THREE.MeshStandardMaterial({ color: color });
                            const mesh = new THREE.Mesh(geometry, material);
                            mesh.position.set(x - width / 2, y - height / 2, z - depth / 2);
                            scene.add(mesh);
                            voxelMeshes.push(mesh);
                        }
                    }
                }
            }
        }

        // --- エクスポート機能 ---
        document.getElementById('saveJsonBtn').addEventListener('click', () => {
            const data = { width, height, depth, voxelData };
            const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "voxel_data.json";
            a.click();
        });

        document.getElementById('importJsonInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = JSON.parse(event.target.result);
                width = data.width; height = data.height; depth = data.depth;
                voxelData = data.voxelData;
                initGrid();
                updateGridColors();
                updateLayerLabel();
                alert("JSONを読み込みました");
            };
            reader.readAsText(file);
        });

        document.getElementById('saveObjBtn').addEventListener('click', () => {
            let objContent = "";
            let vertexCount = 0;
            for (let y = 0; y < height; y++) {
                for (let z = 0; z < depth; z++) {
                    for (let x = 0; x < width; x++) {
                        if (voxelData[y][z][x]) {
                            const ox = x, oy = y, oz = z;
                            objContent += `v ${ox} ${oy} ${oz}\n`;
                            objContent += `v ${ox+1} ${oy} ${oz}\n`;
                            objContent += `v ${ox+1} ${oy+1} ${oz}\n`;
                            objContent += `v ${ox} ${oy+1} ${oz}\n`;
                            objContent += `v ${ox} ${oy} ${oz+1}\n`;
                            objContent += `v ${ox+1} ${oy} ${oz+1}\n`;
                            objContent += `v ${ox+1} ${oy+1} ${oz+1}\n`;
                            objContent += `v ${ox} ${oy+1} ${oz+1}\n`;
                            const b = vertexCount + 1;
                            objContent += `f ${b} ${b+1} ${b+2} ${b+3}\n`;
                            objContent += `f ${b+4} ${b+5} ${b+6} ${b+7}\n`;
                            objContent += `f ${b} ${b+1} ${b+5} ${b+4}\n`;
                            objContent += `f ${b+1} ${b+2} ${b+6} ${b+5}\n`;
                            objContent += `f ${b+2} ${b+3} ${b+7} ${b+6}\n`;
                            objContent += `f ${b+3} ${b} ${b+4} ${b+7}\n`;
                            vertexCount += 8;
                        }
                    }
                }
            }
            const blob = new Blob([objContent], { type: "text/plain" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "model.obj";
            a.click();
        });

        document.getElementById('save3dImageBtn').addEventListener('click', () => {
            if (!is3DInitialized) return;
            const dataUrl = document.getElementById('threejs-canvas').toDataURL("image/png");
            const a = document.createElement("a");
            a.href = dataUrl;
            a.download = "screenshot.png";
            a.click();
        });

        // --- リサイズ・スクロール等 ---
        document.getElementById('resizeBtn').addEventListener('click', () => {
            width = parseInt(document.getElementById('inputWidth').value);
            height = parseInt(document.getElementById('inputHeight').value);
            depth = parseInt(document.getElementById('inputDepth').value);
            currentLayer = 0;
            initData();
            initGrid();
            updateGridColors();
            updateLayerLabel();
        });

        const scrollStep = 100;
        document.getElementById('scrollUp').addEventListener('click', () => gridContainer.scrollBy(0, -scrollStep));
        document.getElementById('scrollDown').addEventListener('click', () => gridContainer.scrollBy(0, scrollStep));
        document.getElementById('scrollLeft').addEventListener('click', () => gridContainer.scrollBy(-scrollStep, 0));
        document.getElementById('scrollRight').addEventListener('click', () => gridContainer.scrollBy(scrollStep, 0));

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm("リセットしますか？")) {
                initData();
                updateGridColors();
            }
        });

        window.addEventListener('resize', () => {
            if (is3DInitialized) {
                renderer.setSize(rendererContainer.clientWidth, rendererContainer.clientHeight);
                camera.aspect = rendererContainer.clientWidth / rendererContainer.clientHeight;
                camera.updateProjectionMatrix();
            }
        });

        // 最後に初期化を実行
        initData();
        initGrid();
        updateGridColors();
        updateLayerLabel();
        setMode('draw');
    </script>
</body>
</html>
